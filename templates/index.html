<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stay updated with the latest Google Cloud BigQuery release notes. Track features, deprecations, changes, and announcements. Draft and post updates directly to X (formerly Twitter).">
  <title>BigQuery Release Notes Stream & Twitter Hub</title>
  
  <!-- Styling -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="shortcut icon" href="https://www.gstatic.com/images/branding/product/2x/google_cloud_64dp.png" type="image/png">
</head>
<body>

  <div class="app-container">
    
    <!-- Main Content Panel: Feed Stream -->
    <main>
      <header>
        <div class="logo-section">
          <h1>
            <svg style="width: 24px; height: 24px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            BigQuery Release Notes
          </h1>
          <p>Real-time Google Cloud updates & sharing workspace</p>
        </div>
        
        <div class="header-actions">
          <button id="refresh-btn" class="btn btn-secondary" title="Fetch latest release notes">
            <span class="btn-text-icon">
              <svg style="width: 15px; height: 15px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18" />
              </svg>
            </span>
            <div class="spinner"></div>
            Refresh
          </button>
        </div>
      </header>

      <div class="content-body">
        
        <!-- Search & Category Filters -->
        <section class="search-filter-bar">
          <div class="search-input-wrapper">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="search-input" placeholder="Search updates, keywords, dates..." aria-label="Search release notes">
          </div>
          
          <select id="category-filter" class="filter-select" aria-label="Filter by category">
            <option value="all">All Categories</option>
            <option value="feature">Features</option>
            <option value="announcement">Announcements</option>
            <option value="change">Changes</option>
            <option value="deprecation">Deprecations</option>
          </select>
        </section>

        <!-- Releases List -->
        <section id="releases-list" aria-label="Release note items">
          <!-- Populated by JavaScript -->
        </section>
        
      </div>
    </main>

    <!-- Sidebar: Tweet Composer -->
    <aside class="sidebar">
      <div class="panel-header">
        <h2>Tweet Composer</h2>
        <p>Select any release note from the feed to draft and publish a tweet.</p>
      </div>

      <!-- Empty State -->
      <div id="empty-tweet-state" class="empty-tweet-state">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <h3>No Update Selected</h3>
        <p>Click on any release card to customize and tweet about it instantly.</p>
      </div>

      <!-- Active Composer Panel -->
      <div id="composer-panel" class="composer-panel">
        <div class="composer-header">
          <svg style="color: var(--tweet-color); width: 18px; height: 18px;" fill="currentColor" viewBox="0 0 24 24">
            <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
          </svg>
          <span id="composer-date" class="origin-date">Update Date</span>
        </div>

        <div class="text-area-wrapper">
          <label for="tweet-textarea" style="display: none;">Tweet content</label>
          <textarea id="tweet-textarea" placeholder="Draft your tweet here..."></textarea>
          
          <div class="composer-footer">
            <div id="char-count-container" class="char-counter-container">
              <!-- Circular Progress -->
              <svg class="progress-ring">
                <circle class="progress-ring-circle-bg" cx="10" cy="10" r="9"/>
                <circle id="progress-circle" class="progress-ring-circle" cx="10" cy="10" r="9"/>
              </svg>
              <span id="char-counter" class="char-counter">280</span>
            </div>
          </div>
        </div>

        <button id="tweet-btn" class="btn btn-tweet">
          Post to X
        </button>
      </div>
    </aside>

  </div>

  <!-- JavaScript -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
